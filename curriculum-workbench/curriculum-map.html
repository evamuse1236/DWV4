<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curriculum Dashboard | IM Mapping</title>
  <link rel="icon" href="data:,">

  <!-- Typography & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">

  <!-- Material Web Components (as primitives) -->
  <script type="importmap">
    {
      "imports": {
        "@material/web/": "https://esm.run/@material/web/"
      }
    }
  </script>
  <script type="module">
    import '@material/web/all.js';
  </script>

  <style>
    :root {
      color-scheme: dark;
      /* Palette: Deep Navy & Neon Accents */
      --bg-base: #0b0e14;
      --bg-surface: #141820;
      --bg-surface-raised: #1c222d;
      --bg-glass: rgba(20, 24, 32, 0.7);
      
      --text-main: #e2e8f0;
      --text-muted: #94a3b8;
      --text-dim: #64748b;

      --accent-direct: #10b981; /* Emerald */
      --accent-direct-glow: rgba(16, 185, 129, 0.15);
      --accent-advanced: #8b5cf6; /* Violet */
      --accent-advanced-glow: rgba(139, 92, 246, 0.15);
      
      --border-main: rgba(255, 255, 255, 0.08);
      --border-bright: rgba(255, 255, 255, 0.15);

      --font-main: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;

      --shadow-soft: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
      --shadow-bright: 0 0 20px rgba(16, 185, 129, 0.1);

      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Base Reset */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-base);
      color: var(--text-main);
      font-family: var(--font-main);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Ambient Background Elements */
    .ambient-glow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: 
        radial-gradient(circle at 0% 0%, rgba(16, 185, 129, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    .grid-overlay {
      position: fixed;
      inset: 0;
      background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: -1;
    }

    /* Layout Structure */
    .app-container {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 100vh;
      max-width: 1800px;
      margin: 0 auto;
    }

    @media (max-width: 1100px) {
      .app-container {
        grid-template-columns: 1fr;
      }
    }

    /* Sidebar / Sidebar-as-Header */
    .sidebar {
      padding: 40px 32px;
      border-right: 1px solid var(--border-main);
      background: var(--bg-glass);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    @media (max-width: 1100px) {
      .sidebar {
        position: relative;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border-main);
      }
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .brand h1 {
      font-size: 24px;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.03em;
      background: linear-gradient(to right, #fff, var(--text-muted));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand p {
      font-size: 13px;
      color: var(--text-dim);
      margin: 0;
      line-height: 1.4;
    }

    /* Controls */
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    md-outlined-text-field {
      --md-outlined-text-field-container-shape: 12px;
      --md-sys-color-primary: var(--accent-direct);
      --md-sys-color-outline: var(--border-main);
      --md-sys-color-on-surface: var(--text-main);
      --md-sys-color-on-surface-variant: var(--text-muted);
      width: 100%;
    }

    /* Custom dark dropdown */
    .select-shell {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 10px 14px 12px;
      background: rgba(11, 18, 28, 0.92);
      border: 1px solid var(--accent-direct);
      border-radius: 12px;
      box-shadow: inset 0 0 0 1px rgba(16, 185, 129, 0.08);
    }

    .select-label {
      position: absolute;
      top: -10px;
      left: 14px;
      padding: 0 8px;
      background: var(--bg-base);
      color: var(--accent-direct);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .select-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text-main);
      font: 500 15px/1.4 var(--font-main);
      padding: 12px 0 4px;
      cursor: pointer;
      user-select: none;
    }

    .select-trigger .material-symbols-outlined {
      color: var(--accent-direct);
      font-size: 20px;
      transition: transform 0.2s ease;
    }

    .select-shell.open .select-trigger .material-symbols-outlined {
      transform: rotate(180deg);
    }

    .select-menu {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      z-index: 100;
      background: #141820;
      border: 1px solid var(--border-bright);
      border-radius: 12px;
      padding: 4px;
      box-shadow: 0 12px 32px -4px rgba(0, 0, 0, 0.6);
      max-height: 260px;
      overflow-y: auto;
    }

    .select-shell.open .select-menu {
      display: block;
    }

    .select-option {
      padding: 10px 14px;
      border-radius: 8px;
      color: var(--text-main);
      font: 400 14px/1.4 var(--font-main);
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .select-option:hover {
      background: var(--bg-surface-raised);
    }

    .select-option.selected {
      color: var(--accent-direct);
      font-weight: 500;
      background: var(--accent-direct-glow);
    }

    /* Global Mode Toggle */
    .mode-toggle-container {
      background: var(--bg-surface);
      border: 1px solid var(--border-main);
      border-radius: 16px;
      padding: 4px;
      display: flex;
      gap: 4px;
    }

    .mode-btn {
      flex: 1;
      border: none;
      background: transparent;
      padding: 10px;
      border-radius: 12px;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .mode-btn.active {
      background: var(--bg-surface-raised);
      color: #fff;
      box-shadow: var(--shadow-soft);
    }

    .mode-btn.direct.active { color: var(--accent-direct); }
    .mode-btn.advanced.active { color: var(--accent-advanced); }

    /* Stats Dashboard */
    .stats-mini {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat-box {
      background: var(--bg-surface);
      border: 1px solid var(--border-main);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-box .label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-box .value { font-size: 20px; font-weight: 700; color: #fff; font-family: var(--font-mono); }

    /* Main Content Area */
    .main-content {
      padding: 40px 60px;
    }

    @media (max-width: 800px) {
      .main-content { padding: 24px; }
    }

    .topic-section {
      display: flex;
      flex-direction: column;
      gap: 60px;
      margin-bottom: 100px;
    }

    .topic-group {
      scroll-margin-top: 40px;
    }

    .topic-header-fancy {
      display: flex;
      align-items: flex-end;
      gap: 24px;
    }

    .topic-number {
      font-family: var(--font-mono);
      font-size: 48px;
      font-weight: 700;
      color: var(--border-bright);
      line-height: 0.8;
      user-select: none;
    }

    .topic-title-box h2 {
      font-size: 40px;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.04em;
    }

    .topic-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
    }

    .topic-title-row h2 {
      flex: 0 1 auto;
    }

    .topic-aliases-wrap {
      display: flex;
      gap: 12px;
      margin-top: 8px;
    }

    .alias-tag {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-dim);
      background: var(--bg-surface);
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--border-main);
    }

    /* Mappings Grid */
    .mappings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 24px;
    }

    @media (max-width: 600px) {
      .mappings-grid { grid-template-columns: 1fr; }
    }

    .mapping-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-main);
      border-radius: 24px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .mapping-card:hover {
      transform: translateY(-4px);
      border-color: var(--border-bright);
      box-shadow: var(--shadow-soft);
    }

    .mapping-card.direct { border-left: 4px solid var(--accent-direct); }
    .mapping-card.advanced { border-left: 4px solid var(--accent-advanced); }

    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .code-badge {
      font-family: var(--font-mono);
      font-size: 12px;
      background: var(--bg-base);
      color: var(--text-muted);
      padding: 4px 12px;
      border-radius: 99px;
      border: 1px solid var(--border-main);
    }

    .grade-badge {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .card-content h3 {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 12px 0;
      line-height: 1.4;
      color: #fff;
    }

    .card-content p {
      font-size: 14px;
      color: var(--text-muted);
      margin: 0;
      line-height: 1.6;
    }

    .why-it-fits {
      margin-top: 16px;
      padding: 16px;
      background: var(--accent-advanced-glow);
      border-radius: 12px;
      font-size: 13px;
      color: var(--accent-advanced);
      border: 1px solid rgba(139, 92, 246, 0.2);
    }

    /* IM Links — inline with topic header */
    .im-header-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: flex-start;
      flex: 1 1 320px;
    }

    .im-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 500;
      text-decoration: none;
      color: var(--text-muted);
      background: var(--bg-surface);
      border: 1px solid var(--border-main);
      transition: var(--transition);
      white-space: nowrap;
      line-height: 1.3;
    }

    .im-pill md-icon {
      font-size: 14px;
    }

    .im-pill:hover {
      color: #fff;
      border-color: var(--accent-direct);
      background: var(--accent-direct-glow);
    }

    .im-pill.advanced:hover {
      border-color: var(--accent-advanced);
      background: var(--accent-advanced-glow);
    }

    @media (max-width: 600px) {
      .topic-title-row {
        align-items: flex-start;
      }

      .im-header-links {
        flex-direction: column;
        align-items: flex-start;
        width: 100%;
      }
    }

    /* Empty States */
    .empty-state {
      text-align: center;
      padding: 100px 40px;
      color: var(--text-dim);
    }

    .empty-state md-icon { font-size: 64px; margin-bottom: 24px; opacity: 0.5; }

    /* Animations */
    @keyframes fadeInSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animate-in {
      animation: fadeInSlide 0.5s ease forwards;
    }

    /* Accordion / Collapsible Topics */
    .topic-header-fancy {
      cursor: pointer;
      user-select: none;
      border-radius: 16px;
      padding: 12px 16px;
      margin: -12px -16px;
      transition: background 0.2s ease;
    }

    .topic-header-fancy:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    .topic-header-fancy:focus-visible {
      outline: 2px solid var(--accent-direct);
      outline-offset: 4px;
      border-radius: 16px;
    }

    .topic-chevron {
      font-size: 28px;
      color: var(--text-dim);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      flex-shrink: 0;
      align-self: center;
    }

    .topic-group.expanded .topic-chevron {
      transform: rotate(180deg);
    }

    .topic-group.expanded .topic-chevron {
      color: var(--text-muted);
    }

    .topic-body {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .topic-group.expanded .topic-body {
      grid-template-rows: 1fr;
    }

    .topic-body-inner {
      overflow: hidden;
    }

    .topic-body-inner .mappings-grid {
      padding-top: 24px;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb { background: var(--border-main); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-bright); }

  </style>
</head>
<body>
  <div class="ambient-glow"></div>
  <div class="grid-overlay"></div>

  <div class="app-container">
    <aside class="sidebar">
      <div class="brand">
        <h1>Curriculum Map</h1>
        <p>A teaching bridge between project work, Common Core, and Illustrative Math.</p>
      </div>

      <div class="mode-toggle-container">
        <button id="modeDirect" class="mode-btn direct active">
          <md-icon style="font-size:18px">check_circle</md-icon> Direct
        </button>
        <button id="modeAdvanced" class="mode-btn advanced">
          <md-icon style="font-size:18px">stars</md-icon> Advanced
        </button>
      </div>

      <div class="control-group">
        <md-outlined-text-field id="searchInput" label="Search Topics" placeholder="e.g. Fractions, Slope...">
          <md-icon slot="leading-icon">search</md-icon>
        </md-outlined-text-field>

        <div class="select-shell" id="gradeDropdown">
          <span class="select-label">Grade Level</span>
          <div class="select-trigger" tabindex="0" role="combobox" aria-expanded="false" aria-haspopup="listbox" aria-label="Grade Level">
            <span class="select-display">All Grades</span>
            <span class="material-symbols-outlined" aria-hidden="true">expand_more</span>
          </div>
          <div class="select-menu" role="listbox">
            <div class="select-option selected" data-value="" role="option">All Grades</div>
            <div class="select-option" data-value="3" role="option">Grade 3</div>
            <div class="select-option" data-value="4" role="option">Grade 4</div>
            <div class="select-option" data-value="5" role="option">Grade 5</div>
            <div class="select-option" data-value="6" role="option">Grade 6</div>
            <div class="select-option" data-value="7" role="option">Grade 7</div>
            <div class="select-option" data-value="8" role="option">Grade 8</div>
          </div>
        </div>

        <md-outlined-text-field id="codeFilter" label="CC Code" placeholder="e.g. 6.NS, 7.RP">
          <md-icon slot="leading-icon">terminal</md-icon>
        </md-outlined-text-field>
      </div>

      <div class="stats-mini">
        <div class="stat-box">
          <span class="label">Topics</span>
          <span id="statTopics" class="value">0</span>
        </div>
        <div class="stat-box">
          <span class="label">Matches</span>
          <span id="statMatches" class="value">0</span>
        </div>
      </div>

      <div style="margin-top: auto;">
        <md-filled-tonal-button id="clearFilters" style="width: 100%;">
          <md-icon slot="icon">refresh</md-icon> Reset View
        </md-filled-tonal-button>
      </div>
    </aside>

    <main class="main-content">
      <div id="topicList" class="topic-section">
        <!-- Content injected by JS -->
      </div>
    </main>
  </div>

  <script>

    function parseTSV(raw, columns) {
      return raw.trim().split("\n").map(line => {
        const parts = line.split("\t");
        const row = {};
        columns.forEach((key, i) => row[key] = (parts[i] || "").trim());
        return row;
      });
    }

    function buildData() {
      const directRows = parseTSV(DIRECT_TSV, ["sourceTopic", "swbat", "code", "description", "grade"]);
      const advancedRows = parseTSV(ADVANCED_TSV, ["sourceTopic", "swbat", "code", "description", "grade", "whyItFits"]);

      TOPIC_ORDER.forEach(title => {
        TOPICS.push({
          title,
          aliases: new Set(),
          direct: directRows.filter(r => (ALIAS_MAP[r.sourceTopic] || r.sourceTopic) === title),
          advanced: advancedRows.filter(r => (ALIAS_MAP[r.sourceTopic] || r.sourceTopic) === title),
          links: IM_LINKS[title] || { direct: [], advanced: [] }
        });
      });

      // Populate aliases
      [...directRows, ...advancedRows].forEach(r => {
        const canonical = ALIAS_MAP[r.sourceTopic] || r.sourceTopic;
        const topic = TOPICS.find(t => t.title === canonical);
        if (topic && r.sourceTopic !== topic.title) topic.aliases.add(r.sourceTopic);
      });
    }

    /* Grade dropdown state */
    let gradeFilterValue = "";

    function readControlValue(id) {
      if (id === 'gradeFilter') return gradeFilterValue;
      const element = document.getElementById(id);
      if (!element) return "";

      if (typeof element.value === "string") return element.value;
      if (element.value != null) return String(element.value);

      const attributeValue = element.getAttribute("value");
      return typeof attributeValue === "string" ? attributeValue : "";
    }

    function writeControlValue(id, value) {
      if (id === 'gradeFilter') {
        gradeFilterValue = value;
        const shell = document.getElementById('gradeDropdown');
        if (!shell) return;
        const display = shell.querySelector('.select-display');
        const options = shell.querySelectorAll('.select-option');
        options.forEach(opt => {
          const isMatch = opt.dataset.value === value;
          opt.classList.toggle('selected', isMatch);
          if (isMatch && display) display.textContent = opt.textContent;
        });
        return;
      }
      const element = document.getElementById(id);
      if (!element) return;

      element.value = value;
      if (value === "") {
        element.removeAttribute("value");
      } else {
        element.setAttribute("value", value);
      }
    }

    function normalizeText(value) {
      return String(value || "").toLowerCase();
    }

          const searchableParts = [topic.title, ...topic.aliases, row.swbat, row.description];
          const mSearch = !search || searchableParts.some(s => normalizeText(s).includes(search));
          const mGrade = !grade || ((String(row.grade || "").match(/\d+/g)) || []).includes(grade);
          const mCode = !code || normalizeText(row.code).includes(code);
          return mSearch && mGrade && mCode;
        });

        if (filteredRows.length === 0) return null;

        return { ...topic, visibleRows: filteredRows };
      }).filter(Boolean);
    }

    /* Rendering */
    function render() {
      const filtered = getFilteredData();
      const list = document.getElementById('topicList');
      list.innerHTML = "";

      // Update Stats
      document.getElementById('statTopics').textContent = filtered.length;
      document.getElementById('statMatches').textContent = filtered.reduce((a, b) => a + b.visibleRows.length, 0);

      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty-state"><md-icon>search_off</md-icon><h2>No matches found.</h2><p>Try adjusting your search terms or filters.</p></div>`;
        return;
      }

      filtered.forEach((topic, idx) => {
        const groupEl = document.createElement('div');
        groupEl.className = 'topic-group animate-in';
        groupEl.style.animationDelay = `${idx * 0.05}s`;

        const aliasesHtml = Array.from(topic.aliases).map(a => `<span class="alias-tag">${a}</span>`).join('');

        const imLinks = topic.links[currentMode] || [];
        const imLinksHtml = imLinks.length > 0 ? `
          <div class="im-header-links">
            ${imLinks.map(link => `
              <a href="${link.url}" target="_blank" rel="noopener" class="im-pill ${currentMode}" title="${link.note}">
                <md-icon>open_in_new</md-icon> ${link.label}
              </a>
            `).join('')}
          </div>
        ` : '';

        groupEl.innerHTML = `
          <div class="topic-header-fancy" role="button" tabindex="0" aria-expanded="false" aria-controls="topic-body-${idx}">
            <div style="display:flex;align-items:flex-end;gap:24px;width:100%">
              <div class="topic-number">${(idx + 1).toString().padStart(2, '0')}</div>
              <div class="topic-title-box" style="flex:1;min-width:0">
                <div class="topic-title-row">
                  <h2>${topic.title}</h2>
                  ${imLinksHtml}
                </div>
                <div class="topic-aliases-wrap">${aliasesHtml}</div>
              </div>
              <span class="material-symbols-outlined topic-chevron" aria-hidden="true">expand_more</span>
            </div>
          </div>

          <div class="topic-body" id="topic-body-${idx}">
            <div class="topic-body-inner">
              <div class="mappings-grid">
                ${topic.visibleRows.map(row => `
                  <div class="mapping-card ${currentMode}">
                    <div class="card-meta">
                      <span class="code-badge">${row.code}</span>
                      <span class="grade-badge">Grade ${row.grade}</span>
                    </div>
                    <div class="card-content">
                      <h3>${row.swbat}</h3>
                      <p>${row.description}</p>
                      ${row.whyItFits ? `<div class="why-it-fits"><strong>Why it fits:</strong> ${row.whyItFits}</div>` : ''}
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        `;

        // Accordion toggle
        const header = groupEl.querySelector('.topic-header-fancy');
        header.addEventListener('click', (e) => {
          // Don't toggle if clicking an IM link
          if (e.target.closest('.im-pill')) return;
          const isExpanded = groupEl.classList.toggle('expanded');
          header.setAttribute('aria-expanded', isExpanded);
        });
        header.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            header.click();
          }
        });

        list.appendChild(groupEl);
      });
    }

    /* Event Listeners */
    document.getElementById('modeDirect').onclick = () => {
      currentMode = 'direct';
      document.getElementById('modeDirect').classList.add('active');
      document.getElementById('modeAdvanced').classList.remove('active');
      render();
    };

    document.getElementById('modeAdvanced').onclick = () => {
      currentMode = 'advanced';
      document.getElementById('modeAdvanced').classList.add('active');
      document.getElementById('modeDirect').classList.remove('active');
      render();
    };

    ['searchInput', 'codeFilter'].forEach(id => {
      const element = document.getElementById(id);
      if (!element) return;
      element.addEventListener('input', render);
      element.addEventListener('change', render);
    });

    /* Custom grade dropdown behavior */
    (function initGradeDropdown() {
      const shell = document.getElementById('gradeDropdown');
      if (!shell) return;
      const trigger = shell.querySelector('.select-trigger');
      const menu = shell.querySelector('.select-menu');

      trigger.addEventListener('click', () => {
        const opening = !shell.classList.contains('open');
        shell.classList.toggle('open');
        trigger.setAttribute('aria-expanded', opening);
      });

      trigger.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          trigger.click();
        } else if (e.key === 'Escape' && shell.classList.contains('open')) {
          shell.classList.remove('open');
          trigger.setAttribute('aria-expanded', 'false');
        }
      });

      menu.addEventListener('click', (e) => {
        const opt = e.target.closest('.select-option');
        if (!opt) return;
        writeControlValue('gradeFilter', opt.dataset.value);
        shell.classList.remove('open');
        trigger.setAttribute('aria-expanded', 'false');
        render();
      });

      document.addEventListener('click', (e) => {
        if (!shell.contains(e.target)) {
          shell.classList.remove('open');
          trigger.setAttribute('aria-expanded', 'false');
        }
      });
    })();

    document.getElementById('clearFilters').onclick = () => {
      writeControlValue('searchInput', "");
      writeControlValue('gradeFilter', "");
      writeControlValue('codeFilter', "");
      render();
    };

    // Initialize
    buildData();
    render();
  </script>
</body>
</html>
